name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. CI — Build both apps (catch errors before deploy) ────────────────────
  ci:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate --schema=./prisma/schema
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Build server
        working-directory: apps/server
        run: npm run build

      - name: Build client
        working-directory: apps/client
        run: npm run build

  # ─── 2. Deploy Server → EC2 ──────────────────────────────────────────────────
  #    (Frontend auto-deploys via Vercel — no job needed here)
  deploy-server:
    name: Deploy Server to EC2
    runs-on: ubuntu-latest
    needs: ci                          # only runs if CI passes
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/sellkaro

            echo "📥 Pulling latest code..."
            git checkout main
            git pull origin main

            echo "📦 Installing dependencies (workspace root)..."
            npm ci

            cd apps/server

            echo "🗄️ Running DB migrations..."
            npm run db:migrate:prod

            echo "⚙️ Generating Prisma client..."
            npm run db:generate:prod

            echo "🔨 Building TypeScript..."
            npm run build

            echo "♻️ Restarting server with PM2..."
            pm2 restart olx-server --update-env || pm2 start ecosystem.config.cjs --env production

            echo "✅ Deploy complete!"
